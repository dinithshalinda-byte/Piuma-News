<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Lanka | AI බලයෙන් පුවත්</title>
    <meta name="description" content="AI තාක්ෂණයෙන් සිංහල පුවත් සාරාංශ">
    <!-- Facebook Open Graph -->
    <meta property="og:title" content="AI News Lanka">
    <meta property="og:description" content="සැබෑ කාලීන සිංහල පුවත්">
    <meta property="og:image" content="https://i.ibb.co/0VpHq4t/news-default.png">
    <meta property="og:url" content="https://shalindadinith-lang.github.io/-sinhala-news/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AI News Lanka">
    <meta name="twitter:description" content="AI බලයෙන් පුවත්">
    <meta name="twitter:image" content="https://i.ibb.co/0VpHq4t/news-default.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --text: #1e293b;
            --text-secondary: #475569;
            --primary: #e63946;
            --border: #e2e8f0;
            --glass: rgba(255,255,255,0.8);
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
            --radius: 20px;
        }
        body.dark {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
            --glass: rgba(30,41,59,0.8);
        }
        body {
            font-family: 'Noto Sans Sinhala', 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }
        .header {
            background: rgba(230, 57, 70, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo i { font-size: 2rem; }
        .header-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            color: #fff;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .btn:hover { background: rgba(255,255,255,0.4); }
        .breaking-news {
            background: #1e293b;
            color: #facc15;
            padding: 0.6rem 2rem;
            overflow: hidden;
            white-space: nowrap;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem;
        }
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid var(--border);
        }
        .card-content {
            padding: 1.2rem;
        }
        .card-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            line-height: 1.4;
        }
        .card-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .search-box {
            display: flex;
            margin: 1.5rem 0;
        }
        .search-box input {
            flex: 1;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: blur(10px);
            color: var(--text);
        }
        .search-box button {
            background: var(--primary);
            border: none;
            color: #fff;
            padding: 0 1.8rem;
            border-radius: 50px;
            margin-left: 0.5rem;
            cursor: pointer;
            font-weight: 600;
        }
        .dark-toggle {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.2rem;
        }
        footer {
            text-align: center;
            padding: 2rem;
            background: var(--surface);
            margin-top: 3rem;
            border-top: 1px solid var(--border);
        }
        @media (max-width: 600px) {
            .header { padding: 1rem; }
            .logo { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="header">
    <div class="logo">
        <i class="fas fa-robot"></i> AI News Lanka
    </div>
    <div class="header-buttons">
        <button class="btn" onclick="toggleDark()"><i class="fas fa-moon"></i> අඳුරු</button>
        <button class="btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>
</div>
<div class="breaking-news" id="breaking">
    <marquee id="ticker">පුවත් පූරණය වෙමින්...</marquee>
</div>
<div class="container">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 පුවත් සොයන්න...">
        <button onclick="filterNews()"><i class="fas fa-search"></i></button>
    </div>
    <div class="news-grid" id="newsGrid"></div>
</div>
<footer>© AI News Lanka - සැබෑ කාලීන සිංහල පුවත්</footer>

<script>
async function fetchArticles() {
    try {
        const res = await fetch('articles.json');
        const articles = await res.json();
        renderArticles(articles);
        updateTicker(articles);
    } catch (e) {
        document.getElementById('newsGrid').innerHTML = '<p style="text-align:center">පුවත් ලබාගැනීම අසාර්ථකයි.</p>';
    }
}
function renderArticles(articles) {
    const grid = document.getElementById('newsGrid');
    grid.innerHTML = articles.map(a => `
        <div class="card" onclick="location.href='articles/${a.id}.html'">
            <img src="${a.image}" onerror="this.src='https://i.ibb.co/0VpHq4t/news-default.png'" alt="news">
            <div class="card-content">
                <div class="card-title">${a.title}</div>
                <div class="card-meta">
                    <span><i class="far fa-calendar"></i> ${a.date}</span>
                    <span>${a.source}</span>
                </div>
            </div>
        </div>
    `).join('');
}
function updateTicker(articles) {
    document.getElementById('ticker').innerHTML = articles.slice(0,5).map(a => a.title).join(' • ');
}
function filterNews() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    const cards = document.querySelectorAll('.card');
    cards.forEach(card => {
        const title = card.querySelector('.card-title').innerText.toLowerCase();
        card.style.display = title.includes(term) ? 'block' : 'none';
    });
}
function toggleDark() {
    document.body.classList.toggle('dark');
    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}
if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
fetchArticles();
</script>
</body>
</html>
