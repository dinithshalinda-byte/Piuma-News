name: Update News Site

on:
  schedule:
    - cron: '*/30 * * * *'   # සෑම විනාඩි 30 කට වරක්
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Generate site
        run: node generate-site.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add articles/ articles.json rss.xml
          git diff --staged --quiet || (git commit -m "Auto-update news" && git push)
